version: "3.9"

services:
  # No Traefik needed — no domain, no HTTPS certificate.
  # API is exposed directly on port 8080.
  # Access via: http://<your-server-ip>:8080

  minio:
    ports:
      - "9000:9000"   # S3 API — used by the Go app internally (but also reachable from outside)
      - "9001:9001"   # MinIO web console — visit http://<ip>:9001 to manage buckets

  api:
    image: registry.digitalocean.com/${DO_REGISTRY}/bdgovtjobs-api:latest
    env_file: .env
    ports:
      - "8080:8080"   # Public API — http://<your-server-ip>:8080

volumes: {}
