<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="color-scheme" content="light dark" />
        <title>JobCirculer — BD Govt Job Alerts</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <script src="https://unpkg.com/htmx.org@2.0.4"></script>
        <script src="https://unpkg.com/hyperscript.org@0.9.14"></script>
        <script src="https://unpkg.com/htmx.org@2.0.4/dist/ext/response-targets.js"></script>
        <link rel="stylesheet" href="/css/style.css" />
        <script>
            // Blocking: set theme before paint to avoid flash
            (function () {
                var theme = localStorage.getItem("theme") || "light";
                document.documentElement.setAttribute("data-theme", theme);
            })();
        </script>
    </head>
    <body hx-ext="response-targets">
        <div
            id="navbar"
            hx-get="/components/navbar.html"
            hx-trigger="load"
            hx-swap="outerHTML"
        ></div>
        <main
            id="main-content"
            hx-get="/pages/home.html"
            hx-trigger="load"
            hx-swap="innerHTML"
        ></main>
        <div
            id="auth-panel"
            hx-get="/components/auth-panel.html"
            hx-trigger="load"
            hx-swap="outerHTML"
        ></div>
        <script src="/js/data.js"></script>
        <script src="/js/app.js"></script>
    </body>
</html>
