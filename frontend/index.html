<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD Govt Job Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <!-- Auth View -->
        <div id="auth-view" class="view active">
            <div class="auth-container">
                <div class="auth-header">
                    <h1>Welcome Back</h1>
                    <p>Discover your next career opportunity.</p>
                </div>
                
                <div class="auth-tabs">
                    <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                    <button class="tab-btn" onclick="switchTab('register')">Register</button>
                </div>

                <!-- Login Form -->
                <form id="login-form" class="auth-form active" onsubmit="handleLogin(event)">
                    <div class="input-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" id="login-email" required placeholder="name@example.com">
                    </div>
                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="primary-btn">Sign In</button>
                    <div id="login-error" class="error-msg"></div>
                </form>

                <!-- Register Form -->
                <form id="register-form" class="auth-form" onsubmit="handleRegister(event)">
                    <div class="input-group">
                        <label for="register-name">Full Name</label>
                        <input type="text" id="register-name" required placeholder="John Doe">
                    </div>
                    <div class="input-group">
                        <label for="register-email">Email Address</label>
                        <input type="email" id="register-email" required placeholder="name@example.com">
                    </div>
                    <div class="input-group">
                        <label for="register-password">Password</label>
                        <input type="password" id="register-password" required minlength="6" placeholder="At least 6 characters">
                    </div>
                    <button type="submit" class="primary-btn">Create Account</button>
                    <div id="register-error" class="error-msg"></div>
                </form>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="view">
            <nav class="navbar">
                <div class="nav-brand">Govt Job Portal</div>
                <div class="nav-actions">
                    <span id="user-name-display"></span>
                    <button onclick="handleLogout()" class="secondary-btn">Logout</button>
                </div>
            </nav>
            <main class="dashboard-content">
                <div class="hero-section">
                    <h2>Welcome to your Dashboard</h2>
                    <p>You have successfully logged in.</p>
                </div>
            </main>
        </div>
    </div>
    
    <script src="/js/app.js"></script>
</body>
</html>
